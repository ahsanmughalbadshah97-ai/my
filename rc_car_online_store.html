<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RC Car Store</title>
<style>
body{
font-family:Arial,sans-serif;
margin:0;
padding:0;
background:#f5f5f5;
}
header{
background:#111;
color:#fff;
padding:15px;
text-align:center;
font-size:24px;
}
.container{
max-width:1000px;
margin:auto;
padding:20px;
}
.product{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}
.product img{
width:250px;
border-radius:10px;
}
.price{
font-size:22px;
color:green;
margin:10px 0;
}
.btn{
background:#28a745;
color:#fff;
padding:12px 20px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}
.btn:hover{
background:#218838;
}
footer{
text-align:center;
padding:15px;
margin-top:20px;
background:#111;
color:#fff;
}
</style>
</head>
<body>

<header>
RC Car Online Store
</header>

<div class="container">

<div class="product">
<h2>High Speed RC Car</h2>
<img src="https://via.placeholder.com/250" alt="RC Car">
<p>Fast racing remote control car with strong battery and durable body.</p>
<div class="price">Rs. 5,500</div>
<button class="btn" onclick="buyNow()">Buy Now</button>
</div>

</div>

<footer>
© 2026 RC Store | All Rights Reserved
</footer>

<script>
function buyNow(){
alert("Order placed request sent! We will contact you soon.");
}
</script>

</body>
</html>
